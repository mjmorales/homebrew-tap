name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

# No approve step: org repos don't allow Actions to approve PRs, and no
# ruleset requires reviews — merge gating is required status checks.
jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
